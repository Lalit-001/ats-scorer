services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ats}
      POSTGRES_DB: ${POSTGRES_DB:-ats}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ats}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Container Postgres is on the internal network as db:5432. Published to the
    # host on 5433 (not 5432) so it won't clash with a locally-installed Postgres.
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Not published to the host (reached internally as redis:6379) to avoid
    # clashing with a local Redis. Add "6380:6379" if you want host access.

  parser:
    build: ./parser
    environment:
      DATA_DIR: ${DATA_DIR:-/data}
    volumes:
      - appdata:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8000:8000"

  api:
    build: ./backend
    command: npm run start:api
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PARSER_URL: ${PARSER_URL}
    volumes:
      - appdata:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"

  worker:
    build: ./backend
    command: npm run start:worker
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PARSER_URL: ${PARSER_URL}
    volumes:
      - appdata:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      parser:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:4000}
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  appdata:
